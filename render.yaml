services:
  - type: web
    name: nexarb
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ADMIN_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TON_API_KEY
        sync: false
    healthCheckPath: /api/health
