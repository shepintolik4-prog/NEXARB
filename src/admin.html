<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXARB · Панель управления</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
    <style>
        body { background: #050505; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-emerald-500">NEXARB</h1>
                <p class="text-zinc-500 text-sm">Панель управления v2.1</p>
            </div>
            <div id="status" class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-xs font-bold uppercase tracking-widest text-zinc-400">System Live</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="stats">
            <!-- Stats will be loaded here -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="card">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <i class="lucide-users text-emerald-500"></i> Пользователи
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-zinc-500 border-b border-zinc-800">
                                    <th class="pb-2">ID / Username</th>
                                    <th class="pb-2">Баланс</th>
                                    <th class="pb-2">Статус</th>
                                    <th class="pb-2">Действия</th>
                                </tr>
                            </thead>
                            <tbody id="user-list">
                                <!-- Users will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div>
                <div class="card mb-4">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <i class="lucide-settings text-emerald-500"></i> Настройки
                    </h2>
                    <div id="config-form" class="space-y-4">
                        <!-- Config will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const secret = window.location.pathname.split('-').pop();
        
        async function loadStats() {
            const r = await fetch('/api/admin/stats', { headers: { 'x-admin-secret': secret } });
            const d = await r.json();
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="card">
                    <p class="text-zinc-500 text-xs uppercase font-bold mb-1">Пользователи</p>
                    <p class="text-2xl font-bold">${d.total_users}</p>
                    <p class="text-emerald-500 text-[10px] mt-1">VIP: ${d.vip_users}</p>
                </div>
                <div class="card">
                    <p class="text-zinc-500 text-xs uppercase font-bold mb-1">Сделки (24ч)</p>
                    <p class="text-2xl font-bold">${d.trades_24h}</p>
                    <p class="text-zinc-500 text-[10px] mt-1">Всего: ${d.total_trades}</p>
                </div>
                <div class="card">
                    <p class="text-zinc-500 text-xs uppercase font-bold mb-1">Объем (24ч)</p>
                    <p class="text-2xl font-bold">$${d.volume_24h.toLocaleString()}</p>
                </div>
                <div class="card">
                    <p class="text-zinc-500 text-xs uppercase font-bold mb-1">Комиссии (24ч)</p>
                    <p class="text-2xl font-bold text-emerald-500">$${d.platform_fees_24h.toLocaleString()}</p>
                </div>
            `;
        }

        async function loadUsers() {
            const r = await fetch('/api/admin/users', { headers: { 'x-admin-secret': secret } });
            const d = await r.json();
            const list = document.getElementById('user-list');
            list.innerHTML = d.items.map(u => `
                <tr class="border-b border-zinc-900/50">
                    <td class="py-3">
                        <p class="font-bold">${u.tg_username || u.id}</p>
                        <p class="text-[10px] text-zinc-600">${u.id}</p>
                    </td>
                    <td class="py-3">
                        <p>$${u.balance.toFixed(2)}</p>
                        <p class="text-[10px] text-zinc-600">Demo: $${u.demo_balance.toFixed(2)}</p>
                    </td>
                    <td class="py-3">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold ${u.vip ? 'bg-emerald-500/20 text-emerald-500' : 'bg-zinc-800 text-zinc-500'}">
                            ${u.vip ? 'VIP' : 'FREE'}
                        </span>
                    </td>
                    <td class="py-3">
                        <button class="text-xs text-blue-500 hover:underline">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        loadStats();
        loadUsers();
    </script>
</body>
</html>
